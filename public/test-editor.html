<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Pencil Editor</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }
    .test-content {
      background: #f7fafc;
      padding: 2rem;
      border-radius: 8px;
      margin: 1rem 0;
    }
    h1, h2, p {
      margin-bottom: 1rem;
    }
    button {
      padding: 0.5rem 1rem;
      margin: 0.5rem;
      cursor: pointer;
    }
    #status {
      background: #e2e8f0;
      padding: 1rem;
      border-radius: 4px;
      margin: 1rem 0;
    }
  </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
  <h1>Test Pencil Editor Admin Functionality</h1>
  
  <div id="status">
    <strong>Status:</strong> <span id="statusText">Loading...</span>
  </div>
  
  <div>
    <h2>Test Controls</h2>
    <button onclick="testLogin()">Test Login as Admin</button>
    <button onclick="testLogout()">Test Logout</button>
    <button onclick="checkEditorStatus()">Check Editor Status</button>
  </div>
  
  <div class="test-content">
    <h1>This is a test heading</h1>
    <p>This is a test paragraph that should be editable when in admin mode.</p>
    <h2>Another heading</h2>
    <p>More content to test the editing functionality.</p>
  </div>
  
  <script>
    let token = localStorage.getItem('token');
    
    function updateStatus(message, isError = false) {
      const statusText = document.getElementById('statusText');
      statusText.textContent = message;
      statusText.style.color = isError ? '#e53e3e' : '#38a169';
    }
    
    async function testLogin() {
      updateStatus('Attempting login...');
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            usernameOrEmail: 'st805@naver.com',
            password: '#9725'
          })
        });
        
        if (response.ok) {
          const data = await response.json();
          token = data.token;
          localStorage.setItem('token', data.token);
          localStorage.setItem('adminUser', JSON.stringify(data.user));
          updateStatus(`Login successful! Role: ${data.user.role}. Reloading page...`);
          
          setTimeout(() => {
            location.reload();
          }, 1500);
        } else {
          const data = await response.json();
          updateStatus(`Login failed: ${data.message}`, true);
        }
      } catch (error) {
        updateStatus(`Error: ${error.message}`, true);
      }
    }
    
    async function testLogout() {
      try {
        await fetch('/api/auth/logout', { method: 'POST' });
        localStorage.removeItem('token');
        localStorage.removeItem('adminUser');
        token = null;
        updateStatus('Logged out successfully. Reloading page...');
        
        setTimeout(() => {
          location.reload();
        }, 1500);
      } catch (error) {
        updateStatus(`Error: ${error.message}`, true);
      }
    }
    
    function checkEditorStatus() {
      const pencilButton = document.getElementById('pencilEditButton');
      if (pencilButton) {
        updateStatus('Pencil button found! Editor is initialized.');
        console.log('Pencil button:', pencilButton);
      } else {
        updateStatus('Pencil button NOT found. Editor may not be initialized.', true);
        console.log('Available buttons:', document.querySelectorAll('button'));
      }
      
      const editableElements = document.querySelectorAll('.pencil-editable');
      updateStatus(`Pencil button: ${pencilButton ? 'Found' : 'Not found'}, Editable elements: ${editableElements.length}`);
    }
    
    // Check status on load
    window.addEventListener('load', () => {
      if (token) {
        updateStatus('Already logged in. Editor should be available.');
      } else {
        updateStatus('Not logged in. Please login to enable editor.');
      }
      
      setTimeout(checkEditorStatus, 2000);
    });
  </script>
  
  <script src="/js/pencil-editor.js"></script>
</body>
</html>
