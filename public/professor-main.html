<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>강성열 교수 홈페이지</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/modern-styles.css">
    <style>
        /* Professor Homepage Specific Styles */
        .hero-section {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 4rem 2rem;
            color: white;
            text-align: center;
        }

        .hero-section h1 {
            font-size: 3rem;
            margin-bottom: 0.5rem;
        }

        .hero-section p {
            font-size: 1.2rem;
            opacity: 0.9;
        }

        .recent-posts-section {
            padding: 3rem 2rem;
            background: linear-gradient(135deg, #1a237e 0%, #283593 100%);
        }

        .section-title {
            text-align: center;
            color: #ffd700;
            font-size: 2rem;
            margin-bottom: 2rem;
        }

        .board-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .board-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .board-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .board-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid rgba(255, 215, 0, 0.5);
        }

        .board-title {
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffd700;
        }

        .board-icon {
            font-size: 1.5rem;
            color: rgba(255, 255, 255, 0.7);
        }

        .post-item {
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            transition: background 0.2s;
            border-radius: 0.5rem;
            padding: 0.75rem;
        }

        .post-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .post-item:last-child {
            border-bottom: none;
        }

        .post-title {
            font-size: 0.95rem;
            color: white;
            margin-bottom: 0.25rem;
            cursor: pointer;
        }

        .post-title:hover {
            color: #ffd700;
        }

        .post-meta {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        .no-posts {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 1rem;
        }

        .media-gallery-section {
            padding: 3rem 2rem;
            background: linear-gradient(135deg, #283593 0%, #1a237e 100%);
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            max-width: 1400px;
            margin: 0 auto;
        }

        .media-item {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s;
            cursor: pointer;
        }

        .media-item:hover {
            transform: scale(1.02);
        }

        .media-content {
            aspect-ratio: 16/9;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 2rem;
        }

        .media-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .media-info {
            padding: 1rem;
        }

        .media-title {
            font-size: 1rem;
            color: white;
            margin-bottom: 0.5rem;
        }

        .media-meta {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.6);
        }

        @media (max-width: 768px) {
            .hero-section h1 {
                font-size: 2rem;
            }

            .board-grid,
            .media-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero-section">
        <h1>강성열 교수</h1>
        <p>한국철학 · 성경학 · 비교종교학</p>
    </section>

    <!-- Recent Posts Section -->
    <section class="recent-posts-section">
        <h2 class="section-title">최신 소식</h2>
        <div class="board-grid" id="recentPostsGrid">
            <!-- Boards will be populated by JavaScript -->
            <div class="board-card">
                <div class="board-header">
                    <span class="board-title">공지사항</span>
                    <i class="fas fa-bell board-icon"></i>
                </div>
                <div id="notice-posts"></div>
            </div>
            
            <div class="board-card">
                <div class="board-header">
                    <span class="board-title">한국사상과성경</span>
                    <i class="fas fa-book board-icon"></i>
                </div>
                <div id="korean_bible-posts"></div>
            </div>
            
            <div class="board-card">
                <div class="board-header">
                    <span class="board-title">세계사상과성경</span>
                    <i class="fas fa-globe board-icon"></i>
                </div>
                <div id="world_bible-posts"></div>
            </div>
            
            <div class="board-card">
                <div class="board-header">
                    <span class="board-title">책과논문</span>
                    <i class="fas fa-file-alt board-icon"></i>
                </div>
                <div id="books_papers-posts"></div>
            </div>
            
            <div class="board-card">
                <div class="board-header">
                    <span class="board-title">열린마당</span>
                    <i class="fas fa-comments board-icon"></i>
                </div>
                <div id="openforum-posts"></div>
            </div>
            
            <div class="board-card">
                <div class="board-header">
                    <span class="board-title">게시판</span>
                    <i class="fas fa-list board-icon"></i>
                </div>
                <div id="board-posts"></div>
            </div>
        </div>
    </section>

    <!-- Media Gallery Section -->
    <section class="media-gallery-section">
        <h2 class="section-title">이미지 & 동영상</h2>
        <div class="media-grid" id="mediaGallery">
            <!-- Media items will be populated by JavaScript -->
        </div>
    </section>

    <!-- Navigation Bar -->
    <nav style="position: fixed; bottom: 20px; right: 20px; z-index: 9999;">
        <div style="background: rgba(255,255,255,0.95); border-radius: 50px; padding: 0.8rem 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.3);">
            <a href="login.html" style="text-decoration: none; color: #667eea; font-weight: bold; margin-right: 1rem;">로그인</a>
            <a href="register.html" style="text-decoration: none; color: #667eea; font-weight: bold;">회원가입</a>
        </div>
    </nav>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        // Fetch recent posts on page load
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const response = await axios.get('/api/posts/recent');
                const { recentPosts, recentMedia } = response.data;

                // Populate each board
                const boards = [
                    { type: 'notice', elementId: 'notice-posts' },
                    { type: 'korean_bible', elementId: 'korean_bible-posts' },
                    { type: 'world_bible', elementId: 'world_bible-posts' },
                    { type: 'books_papers', elementId: 'books_papers-posts' },
                    { type: 'openforum', elementId: 'openforum-posts' },
                    { type: 'board', elementId: 'board-posts' }
                ];

                boards.forEach(board => {
                    const container = document.getElementById(board.elementId);
                    const posts = recentPosts[board.type] || [];

                    if (posts.length === 0) {
                        container.innerHTML = '<div class="no-posts">게시글이 없습니다</div>';
                    } else {
                        container.innerHTML = posts.map(post => `
                            <div class="post-item">
                                <div class="post-title" onclick="viewPost('${post._id}')">${post.title}</div>
                                <div class="post-meta">
                                    ${post.author} · ${new Date(post.createdAt).toLocaleDateString('ko-KR')}
                                </div>
                            </div>
                        `).join('');
                    }
                });

                // Populate media gallery
                const mediaContainer = document.getElementById('mediaGallery');
                if (recentMedia && recentMedia.length > 0) {
                    mediaContainer.innerHTML = recentMedia.map(media => `
                        <div class="media-item" onclick="viewMedia('${media._id}')">
                            <div class="media-content">
                                ${media.mediaType === 'image' 
                                    ? `<img src="${media.url}" alt="${media.title}" class="media-image">`
                                    : '<i class="fas fa-play-circle"></i>'
                                }
                            </div>
                            <div class="media-info">
                                <div class="media-title">${media.title}</div>
                                <div class="media-meta">
                                    ${media.uploadedBy?.name || 'Unknown'} · ${new Date(media.createdAt).toLocaleDateString('ko-KR')}
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    mediaContainer.innerHTML = '<div class="no-posts">미디어가 없습니다</div>';
                }
            } catch (error) {
                console.error('Error fetching recent posts:', error);
            }
        });

        function viewPost(postId) {
            window.location.href = `post.html?id=${postId}`;
        }

        function viewMedia(mediaId) {
            window.location.href = `media.html?id=${mediaId}`;
        }
    </script>
</body>
</html>
