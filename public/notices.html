<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>공지사항 | Mount Zion Church & Empire</title>
  <link rel="stylesheet" href="/css/styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
  <header class="header">
    <div class="header-content">
      <a href="/" class="logo">
        <div class="logo-text">
          <span class="korean-name">시온산교회 시온산제국</span>
          <span class="english-name">Mount Zion Church   Mount Zion Empire</span>
        </div>
      </a>
      <nav class="nav">
        <ul class="main-menu">
          <li class="nav-item"><a href="/operator" class="nav-link" data-page="operator">운영자소개</a></li>
          <li class="nav-item"><a href="/church" class="nav-link" data-page="church">시온산교회</a></li>
          <li class="nav-item"><a href="/empire" class="nav-link" data-page="empire">시온산제국</a></li>
          <li class="nav-item"><a href="/books" class="nav-link" data-page="books">책과논문</a></li>
          <li class="nav-item dropdown">
            <a href="#" class="nav-link">열린마당 ▼</a>
            <div class="dropdown-content">
              <a href="/notices" class="active">공지사항</a>
              <a href="/board">게시판</a>
              <a href="/gallery">이미지&동영상</a>
            </div>
          </li>
          <li class="nav-item"><a href="/admin" class="nav-link" id="adminLink">관리자</a></li>
        </ul>
        <button class="mobile-menu-toggle" id="mobileMenuToggle"><span></span><span></span><span></span></button>
      </nav>
    </div>
  </header>

  <div class="header-overlay" id="mobileMenuOverlay">
    <button class="header-overlay-close">&times;</button>
    <div class="header-overlay-content">
      <nav class="mobile-menu">
        <a href="/operator" class="mobile-menu-link">운영자소개</a>
        <a href="/church" class="mobile-menu-link">시온산교회</a>
        <a href="/empire" class="mobile-menu-link">시온산제국</a>
        <a href="/books" class="mobile-menu-link">책과논문</a>
        <a href="/notices" class="mobile-menu-link active">공지사항</a>
        <a href="/board" class="mobile-menu-link">게시판</a>
        <a href="/gallery" class="mobile-menu-link">이미지&동영상</a>
        <a href="/admin" class="mobile-menu-link" id="mobileAdminLink">관리자</a>
      </nav>
      <div class="mobile-auth-section">
        <a href="/admin-login" class="btn btn-primary" id="mobileLoginBtn">로그인</a>
        <a href="#" class="btn btn-outline" id="mobileLogoutBtn" style="display: none;">로그아웃</a>
      </div>
    </div>
  </div>

  <main class="main-content">
    <section class="hero notices-hero">
      <div class="hero-content">
        <h1 class="hero-title editable">공지사항</h1>
        <p class="hero-subtitle editable">시온산교회와 시온산제국의 소식과 안내</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <h2 class="section-title editable">공지목록</h2>
        <div class="content-block editable">
          <p>준비 중입니다. 곧 공지사항이 업데이트될 예정입니다.</p>
        </div>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-content">
      <div class="footer-section">
        <h3>联系我们</h3>
        <p>시온산교회 시온산제국</p>
      </div>
      <div class="footer-section">
        <p>&copy; 2024 Mount Zion Church & Empire.</p>
      </div>
    </div>
  </footer>

  <script>
    const app = { isLoggedIn() { return localStorage.getItem('token') !== null; } };
    document.addEventListener('DOMContentLoaded', () => {
      const mobileMenuToggle = document.getElementById('mobileMenuToggle');
      const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');
      mobileMenuToggle?.addEventListener('click', () => mobileMenuOverlay.classList.add('active'));
      document.querySelector('.header-overlay-close')?.addEventListener('click', () => mobileMenuOverlay.classList.remove('active'));
    });
  </script>
  <!-- Professional Advanced Editor (Pro Editor) -->
  <script src="/js/pro-editor.js"></script>
</body>
</html>
