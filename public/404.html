<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="페이지를 찾을 수 없습니다 - 정중호 교수의 성경 사랑방 | Page Not Found - Bible Glocal">
  <title>404 - 페이지를 찾을 수 없습니다 | Page Not Found</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 600px;
    }
    .cross {
      font-size: 4rem;
      margin-bottom: 1rem;
      opacity: 0.7;
    }
    .error-code {
      font-family: 'Cormorant Garamond', serif;
      font-size: 8rem;
      font-weight: 700;
      line-height: 1;
      background: linear-gradient(135deg, #c9a84c, #f0d78c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    h1 {
      font-family: 'Noto Sans KR', sans-serif;
      font-size: 1.5rem;
      font-weight: 500;
      margin: 1rem 0 0.5rem;
      color: #f0d78c;
    }
    p {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 0.5rem;
      line-height: 1.6;
    }
    .verse {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.1rem;
      color: #c9a84c;
      margin: 2rem 0;
      padding: 1rem 1.5rem;
      border-left: 3px solid #c9a84c33;
    }
    .verse cite {
      display: block;
      font-style: normal;
      font-size: 0.85rem;
      color: #888;
      margin-top: 0.5rem;
    }
    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 2rem;
    }
    .links a {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1.5rem;
      border-radius: 8px;
      text-decoration: none;
      font-size: 0.95rem;
      font-weight: 500;
      transition: all 0.3s ease;
    }
    .btn-home {
      background: linear-gradient(135deg, #c9a84c, #a07c35);
      color: #1a1a2e;
    }
    .btn-home:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(201,168,76,0.3); }
    .btn-back {
      background: rgba(255,255,255,0.1);
      color: #e0e0e0;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .btn-back:hover { background: rgba(255,255,255,0.15); transform: translateY(-2px); }
  </style>

</head>
<body>
  <div class="container">
    <div class="cross">✝</div>
    <div class="error-code">404</div>
    <h1>페이지를 찾을 수 없습니다</h1>
    <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>
    <p style="font-size:0.9rem; color:#888;">The page you're looking for doesn't exist or has been moved.</p>
    
    <div class="verse">
      "내가 곧 길이요 진리요 생명이니"
      <cite>— 요한복음 14:6 / John 14:6</cite>
    </div>
    
    <div class="links">
      <a href="/index.html" class="btn-home">🏠 홈으로 돌아가기</a>
      <a href="javascript:history.back()" class="btn-back">← 이전 페이지</a>
      <a href="/en/index.html" class="btn-back">🌐 English Home</a>
    </div>
  </div>
</body>
</html>
