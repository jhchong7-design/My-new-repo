<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 대시보드 - 강성열 교수 홈페이지</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/modern-styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 280px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 2rem 1rem;
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            color: white;
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 2rem;
            text-align: center;
        }

        .nav-menu {
            flex: 1;
        }

        .nav-item {
            color: rgba(255, 255, 255, 0.8);
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .nav-item:hover,
        .nav-item.active {
            background: rgba(255, 255, 255, 0.2);
            color: white;
        }

        .main-content {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            color: white;
        }

        .header h1 {
            font-size: 2rem;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .user-name {
            color: white;
            font-weight: 500;
        }

        .btn-logout {
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.3s;
        }

        .btn-logout:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        .stat-title {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }

        .stat-value {
            color: #667eea;
            font-size: 2.5rem;
            font-weight: bold;
        }

        .content-section {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 1rem;
            padding: 2rem;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-title {
            font-size: 1.5rem;
            color: #333;
        }

        .btn-primary {
            padding: 0.75rem 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        .table th {
            background: #f5f5f5;
            font-weight: 600;
            color: #666;
        }

        .table tbody tr:hover {
            background: #f9f9f9;
        }

        .action-buttons {
            display: flex;
            gap: 0.5rem;
        }

        .btn-edit {
            padding: 0.5rem 1rem;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .btn-delete {
            padding: 0.5rem 1rem;
            background: #f44336;
            color: white;
            border: none;
            border-radius: 0.25rem;
            cursor: pointer;
            font-size: 0.875rem;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: white;
            border-radius: 1rem;
            padding: 2rem;
            max-width: 600px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-title {
            font-size: 1.5rem;
            color: #333;
        }

        .btn-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #333;
            font-weight: 500;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 0.875rem;
            border: 2px solid #e0e0e0;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group textarea {
            min-height: 200px;
            resize: vertical;
        }

        @media (max-width: 768px) {
            .admin-layout {
                flex-direction: column;
            }

            .sidebar {
                width: 100%;
                padding: 1rem;
            }

            .main-content {
                padding: 1rem;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
<script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-user-shield"></i> 관리자
            </div>
            <nav class="nav-menu">
                <div class="nav-item active" data-section="dashboard">
                    <i class="fas fa-tachometer-alt"></i>
                    <span>대시보드</span>
                </div>
                <div class="nav-item" data-section="notices">
                    <i class="fas fa-bell"></i>
                    <span>공지사항</span>
                </div>
                <div class="nav-item" data-section="korean_bible">
                    <i class="fas fa-book"></i>
                    <span>한국사상과성경</span>
                </div>
                <div class="nav-item" data-section="world_bible">
                    <i class="fas fa-globe"></i>
                    <span>세계사상과성경</span>
                </div>
                <div class="nav-item" data-section="books_papers">
                    <i class="fas fa-file-alt"></i>
                    <span>책과논문</span>
                </div>
                <div class="nav-item" data-section="openforum">
                    <i class="fas fa-comments"></i>
                    <span>열린마당</span>
                </div>
                <div class="nav-item" data-section="boards">
                    <i class="fas fa-list"></i>
                    <span>게시판</span>
                </div>
                <div class="nav-item" data-section="media">
                    <i class="fas fa-photo-video"></i>
                    <span>이미지&동영상</span>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Header -->
            <header class="header">
                <h1>관리자 대시보드</h1>
                <div class="user-info">
                    <span class="user-name" id="userName">관리자</span>
                    <button class="btn-logout" onclick="logout()">
                        <i class="fas fa-sign-out-alt"></i> 로그아웃
                    </button>
                </div>
            </header>

            <!-- Dashboard Section -->
            <section id="dashboard" class="content-section active">
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-title">총 회원수</div>
                        <div class="stat-value" id="totalUsers">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">총 게시글</div>
                        <div class="stat-value" id="totalPosts">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">공지사항</div>
                        <div class="stat-value" id="noticeCount">0</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-title">미디어</div>
                        <div class="stat-value" id="totalMedia">0</div>
                    </div>
                </div>
            </section>

            <!-- Notices Section -->
            <section id="notices" class="content-section">
                <div class="section-header">
                    <h2 class="section-title">공지사항</h2>
                    <button class="btn-primary" onclick="openModal('notice')">
                        <i class="fas fa-plus"></i> 글 쓰기
                    </button>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>제목</th>
                            <th>작성자</th>
                            <th>작성일</th>
                            <th>조회수</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="notices-list"></tbody>
                </table>
            </section>

            <!-- Other board sections (similar structure) -->
            <section id="korean_bible" class="content-section">
                <div class="section-header">
                    <h2 class="section-title">한국사상과성경</h2>
                    <button class="btn-primary" onclick="openModal('korean_bible')">
                        <i class="fas fa-plus"></i> 글 쓰기
                    </button>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>제목</th>
                            <th>작성자</th>
                            <th>작성일</th>
                            <th>조회수</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <tbody id="korean_bible-list"></tbody>
                </table>
            </section>

            <!-- Post/Edit Modal -->
            <div id="postModal" class="modal">
                <div class="modal-content">
                    <div class="modal-header">
                        <h3 class="modal-title" id="modalTitle">글 쓰기</h3>
                        <button class="btn-close" onclick="closeModal()">&times;</button>
                    </div>
                    <form id="postForm">
                        <input type="hidden" id="editPostId">
                        <input type="hidden" id="postBoardType">
                        
                        <div class="form-group">
                            <label for="postTitle">제목</label>
                            <input type="text" id="postTitle" required>
                        </div>

                        <div class="form-group">
                            <label for="postContent">내용</label>
                            <textarea id="postContent" required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="postCategory">카테고리</label>
                            <select id="postCategory">
                                <option value="">선택안함</option>
                                <option value="연구">연구</option>
                                <option value="강의">강의</option>
                                <option value="논문">논문</option>
                                <option value="자료">자료</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>
                                <input type="checkbox" id="postPinned">
                                상단 고정
                            </label>
                        </div>

                        <button type="submit" class="btn-primary">저장</button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        let currentSection = 'dashboard';
        let currentBoardType = '';

        // Set auth token
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user'));

        if (!token) {
            window.location.href = 'professor-login.html';
        }

        // Set user info
        document.getElementById('userName').textContent = user?.name || '관리자';

        // Navigation
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                const section = item.dataset.section;
                switchSection(section);
            });
        });

        function switchSection(section) {
            currentSection = section;
            
            // Update nav
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.section === section) {
                    item.classList.add('active');
                }
            });

            // Update content
            document.querySelectorAll('.content-section').forEach(sec => {
                sec.classList.remove('active');
            });

            const targetSection = document.getElementById(section);
            if (targetSection) {
                targetSection.classList.add('active');
            }

            // Load data
            if (section === 'dashboard') {
                loadStats();
            } else if (['notices', 'korean_bible', 'world_bible', 'books_papers', 'openforum', 'boards'].includes(section)) {
                loadPosts(section);
            }
        }

        // Load stats
        async function loadStats() {
            try {
                const response = await axios.get('/api/admin/stats', {
                    headers: { Authorization: `Bearer ${token}` }
                });
                const { stats } = response.data;

                document.getElementById('totalUsers').textContent = stats.totalUsers;
                document.getElementById('totalPosts').textContent = stats.totalPosts;
                document.getElementById('noticeCount').textContent = stats.noticeCount;
                document.getElementById('totalMedia').textContent = stats.totalMedia;
            } catch (error) {
                console.error('Error loading stats:', error);
            }
        }

        // Load posts for specific board
        async function loadPosts(boardType) {
            try {
                const response = await axios.get(`/api/posts?boardType=${boardType}&limit=50`);
                const { posts } = response.data;

                const tbody = document.getElementById(`${boardType}-list`);
                if (tbody) {
                    tbody.innerHTML = posts.map(post => `
                        <tr>
                            <td>${post.title} ${post.isPinned ? '<i class="fas fa-thumbtack" style="color: #667eea;"></i>' : ''}</td>
                            <td>${post.author}</td>
                            <td>${new Date(post.createdAt).toLocaleDateString('ko-KR')}</td>
                            <td>${post.views}</td>
                            <td class="action-buttons">
                                <button class="btn-edit" onclick="editPost('${post._id}')">
                                    <i class="fas fa-edit"></i> 수정
                                </button>
                                <button class="btn-delete" onclick="deletePost('${post._id}')">
                                    <i class="fas fa-trash"></i> 삭제
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
            } catch (error) {
                console.error('Error loading posts:', error);
            }
        }

        // Modal functions
        function openModal(boardType) {
            currentBoardType = boardType;
            document.getElementById('postBoardType').value = boardType;
            document.getElementById('modalTitle').textContent = '글 쓰기';
            document.getElementById('postForm').reset();
            document.getElementById('editPostId').value = '';
            document.getElementById('postModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('postModal').classList.remove('active');
        }

        // Form submit
        document.getElementById('postForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const editPostId = document.getElementById('editPostId').value;
            const boardType = document.getElementById('postBoardType').value;
            const title = document.getElementById('postTitle').value;
            const content = document.getElementById('postContent').value;
            const category = document.getElementById('postCategory').value;
            const isPinned = document.getElementById('postPinned').checked;

            try {
                if (editPostId) {
                    // Update
                    await axios.put(`/api/posts/${editPostId}`, {
                        title,
                        content,
                        category,
                        isPinned
                    }, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                } else {
                    // Create
                    await axios.post('/api/posts', {
                        title,
                        content,
                        boardType,
                        category,
                        isPinned
                    }, {
                        headers: { Authorization: `Bearer ${token}` }
                    });
                }

                closeModal();
                loadPosts(boardType);
            } catch (error) {
                alert('저장 중 오류가 발생했습니다.');
                console.error(error);
            }
        });

        // Edit post
        async function editPost(postId) {
            try {
                const response = await axios.get(`/api/posts/${postId}`);
                const { post } = response.data;

                document.getElementById('editPostId').value = post._id;
                document.getElementById('postBoardType').value = post.boardType;
                document.getElementById('postTitle').value = post.title;
                document.getElementById('postContent').value = post.content;
                document.getElementById('postCategory').value = post.category || '';
                document.getElementById('postPinned').checked = post.isPinned;
                document.getElementById('modalTitle').textContent = '글 수정';

                document.getElementById('postModal').classList.add('active');
            } catch (error) {
                alert('게시글을 불러오는데 실패했습니다.');
                console.error(error);
            }
        }

        // Delete post
        async function deletePost(postId) {
            if (!confirm('정말 삭제하시겠습니까?')) return;

            try {
                await axios.delete(`/api/posts/${postId}`, {
                    headers: { Authorization: `Bearer ${token}` }
                });
                loadPosts(currentSection);
            } catch (error) {
                alert('삭제 중 오류가 발생했습니다.');
                console.error(error);
            }
        }

        // Logout
        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'professor-main.html';
        }

        // Load initial data
        loadStats();
    </script>
</body>
</html>
