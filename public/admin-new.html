<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시온산교회 시온산제국 - 관리자 대시보드</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.tiny.cloud/1/no-api-key/tinymce/6/tinymce.min.js" referrerpolicy="origin"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #667eea;
            --primary-dark: #5a67d8;
            --secondary: #764ba2;
            --success: #48bb78;
            --warning: #ed8936;
            --danger: #f56565;
            --dark: #1a202c;
            --light: #f7fafc;
            --border: #e2e8f0;
            --text: #2d3748;
            --text-light: #718096;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .dark-mode {
            --primary: #8098ff;
            --primary-dark: #667eea;
            --secondary: #b689c4;
            --dark: #f7fafc;
            --light: #1a202c;
            --border: #4a5568;
            --text: #e2e8f0;
            --text-light: #a0aec0;
        }

        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background: var(--light);
            color: var(--text);
            min-height: 100vh;
            display: flex;
        }

        /* Sidebar */
        .sidebar {
            width: 270px;
            background: white;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 1000;
            transition: transform 0.3s ease;
        }

        .dark-mode .sidebar {
            background: var(--dark);
            border-right-color: var(--border);
        }

        .sidebar-header {
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-weight: 700;
            font-size: 1.25rem;
            color: var(--primary);
        }

        .logo i {
            font-size: 1.5rem;
        }

        .sidebar-nav {
            flex: 1;
            padding: 1rem 0.5rem;
            overflow-y: auto;
        }

        .nav-section {
            margin-bottom: 1.5rem;
        }

        .nav-section-title {
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            color: var(--text-light);
            padding: 0.5rem 1rem;
            letter-spacing: 0.5px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            color: var(--text);
            text-decoration: none;
            transition: all 0.2s;
            cursor: pointer;
            margin-bottom: 2px;
        }

        .nav-item:hover {
            background: var(--light);
            color: var(--primary);
        }

        .nav-item.active {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            box-shadow: var(--shadow);
        }

        .nav-item i {
            width: 20px;
            text-align: center;
        }

        .sidebar-footer {
            padding: 1rem;
            border-top: 1px solid var(--border);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            margin-left: 270px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Header */
        .dashboard-header {
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 999;
        }

        .dark-mode .dashboard-header {
            background: var(--dark);
            border-bottom-color: var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .search-box {
            position: relative;
            width: 300px;
        }

        .search-box input {
            width: 100%;
            padding: 0.625rem 1rem 0.625rem 2.5rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--light);
            color: var(--text);
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .search-box i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .header-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: white;
            color: var(--text);
            text-decoration: none;
            font-size: 0.875rem;
            transition: all 0.2s;
            cursor: pointer;
        }

        .header-btn:hover {
            background: var(--light);
            border-color: var(--primary);
        }

        .header-btn i {
            font-size: 1rem;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.5rem 1rem;
            background: var(--light);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .user-profile:hover {
            background: var(--border);
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 600;
            font-size: 0.875rem;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            font-size: 0.875rem;
        }

        .user-role {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        /* Content Area */
        .content-area {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }

        /* Dashboard Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            display: flex;
            align-items: flex-start;
            gap: 1rem;
            transition: all 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .dark-mode .stat-card {
            background: var(--dark);
            border-color: var(--border);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            flex-shrink: 0;
        }

        .stat-icon.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .stat-icon.success {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
        }

        .stat-icon.warning {
            background: linear-gradient(135deg, #ed8936 0%, #dd6b20 100%);
            color: white;
        }

        .stat-icon.danger {
            background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
            color: white;
        }

        .stat-content {
            flex: 1;
        }

        .stat-label {
            font-size: 0.875rem;
            color: var(--text-light);
            margin-bottom: 0.25rem;
        }

        .stat-value {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--text);
            line-height: 1;
        }

        .stat-change {
            font-size: 0.75rem;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.25rem;
        }

        .stat-change.positive {
            color: var(--success);
        }

        .stat-change.negative {
            color: var(--danger);
        }

        /* Content Grid */
        .content-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        .content-card {
            background: white;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
        }

        .dark-mode .content-card {
            background: var(--dark);
            border-color: var(--border);
        }

        .card-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .card-title {
            font-size: 1.125rem;
            font-weight: 600;
            color: var(--text);
        }

        .card-subtitle {
            font-size: 0.875rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            text-decoration: none;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow);
        }

        .btn-secondary {
            background: var(--light);
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--border);
        }

        .btn-sm {
            padding: 0.375rem 0.75rem;
            font-size: 0.75rem;
        }

        .card-body {
            padding: 1.5rem;
        }

        /* Content List */
        .content-list {
            list-style: none;
        }

        .content-item {
            display: flex;
            align-items: center;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            transition: all 0.2s;
        }

        .content-item:last-child {
            border-bottom: none;
        }

        .content-item:hover {
            background: var(--light);
        }

        .content-item-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 1rem;
            flex-shrink: 0;
        }

        .content-item-info {
            flex: 1;
        }

        .content-item-title {
            font-weight: 600;
            color: var(--text);
            margin-bottom: 0.25rem;
        }

        .content-item-meta {
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .content-item-actions {
            display: flex;
            gap: 0.5rem;
        }

        /* Activity Feed */
        .activity-list {
            list-style: none;
        }

        .activity-item {
            display: flex;
            gap: 0.75rem;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        .activity-item:last-child {
            border-bottom: none;
        }

        .activity-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--light);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            flex-shrink: 0;
        }

        .activity-content {
            flex: 1;
        }

        .activity-text {
            font-size: 0.875rem;
            color: var(--text);
            line-height: 1.5;
        }

        .activity-time {
            font-size: 0.75rem;
            color: var(--text-light);
            margin-top: 0.25rem;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 2000;
            align-items: center;
            justify-content: center;
            animation: fadeIn 0.2s ease;
        }

        .modal.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: white;
            border-radius: 12px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .modal-header {
            padding: 1.25rem 1.5rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text);
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: var(--text-light);
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            transition: all 0.2s;
        }

        .modal-close:hover {
            background: var(--light);
            color: var(--text);
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 1.5rem;
        }

        .modal-footer {
            padding: 1.25rem 1.5rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 0.75rem;
            justify-content: flex-end;
        }

        /* Form Groups */
        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-label {
            display: block;
            font-weight: 500;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-size: 0.875rem;
        }

        .form-control {
            width: 100%;
            padding: 0.625rem 1rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 0.875rem;
            background: var(--light);
            color: var(--text);
            transition: all 0.2s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }
        }

        /* Status Badge */
        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .status-badge.active {
            background: #c6f6d5;
            color: #22543d;
        }

        .status-badge.inactive {
            background: #fed7d7;
            color: #742a2a;
        }

        .status-badge.draft {
            background: #feebc8;
            color: #744210;
        }

        /* Toggle Switch */
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--border);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .toggle-switch.active {
            background: var(--primary);
        }

        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 20px;
            height: 20px;
            background: white;
            border-radius: 50%;
            transition: all 0.2s;
        }

        .toggle-switch.active::after {
            left: 22px;
        }

        /* Inline Editor Button */
        .inline-edit-btn {
            position: fixed;
            bottom: 100px;
            right: 20px;
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
            border: none;
            cursor: pointer;
            box-shadow: var(--shadow-lg);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: all 0.3s ease;
        }

        .inline-edit-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 15px 30px rgba(102, 126, 234, 0.4);
        }

        .inline-edit-btn.active {
            background: var(--danger);
        }

        /* Notification */
        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 1rem 1.5rem;
            border-radius: 8px;
            background: white;
            box-shadow: var(--shadow-lg);
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { transform: translateX(400px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .notification.success {
            border-left: 4px solid var(--success);
        }

        .notification.error {
            border-left: 4px solid var(--danger);
        }

        .notification.info {
            border-left: 4px solid var(--primary);
        }
    </style>
    <script src="https://sites.super.myninja.ai/_assets/ninja-daytona-script.js"></script>
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-church"></i>
                <span>시온산교회</span>
            </div>
        </div>

        <nav class="sidebar-nav">
            <div class="nav-section">
                <div class="nav-section-title">메인</div>
                <a href="#" class="nav-item active" data-section="dashboard">
                    <i class="fas fa-chart-line"></i>
                    <span>대시보드</span>
                </a>
                <a href="#" class="nav-item" data-section="content">
                    <i class="fas fa-edit"></i>
                    <span>콘텐츠</span>
                </a>
                <a href="#" class="nav-item" data-section="media">
                    <i class="fas fa-images"></i>
                    <span>미디어</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">관리</div>
                <a href="#" class="nav-item" data-section="pages">
                    <i class="fas fa-file-alt"></i>
                    <span>페이지</span>
                </a>
                <a href="#" class="nav-item" data-section="notices">
                    <i class="fas fa-bullhorn"></i>
                    <span>공지사항</span>
                </a>
                <a href="#" class="nav-item" data-section="users">
                    <i class="fas fa-users"></i>
                    <span>사용자</span>
                </a>
            </div>

            <div class="nav-section">
                <div class="nav-section-title">설정</div>
                <a href="#" class="nav-item" data-section="settings">
                    <i class="fas fa-cog"></i>
                    <span>설정</span>
                </a>
                <a href="#" class="nav-item" data-section="analytics">
                    <i class="fas fa-chart-bar"></i>
                    <span>분석</span>
                </a>
            </div>
        </nav>

        <div class="sidebar-footer">
            <a href="/" class="nav-item" style="margin-bottom: 0.5rem;">
                <i class="fas fa-globe"></i>
                <span>사이트 보기</span>
            </a>
            <button class="nav-item" onclick="logout()" style="width: 100%; border: none; background: none; color: var(--danger); margin-bottom: 0;">
                <i class="fas fa-sign-out-alt"></i>
                <span>로그아웃</span>
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="main-content">
        <!-- Header -->
        <header class="dashboard-header">
            <div class="header-left">
                <button class="header-btn" onclick="toggleSidebar()">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="검색...">
                </div>
            </div>
            <div class="header-right">
                <button class="header-btn" onclick="toggleDarkMode()">
                    <i class="fas fa-moon"></i>
                </button>
                <button class="header-btn" onclick="openInlineEditor()">
                    <i class="fas fa-pencil-alt"></i>
                    <span>인라인 편집</span>
                </button>
                <div class="user-profile">
                    <div class="user-avatar">정</div>
                    <div class="user-info">
                        <div class="user-name">정중호</div>
                        <div class="user-role">관리자</div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-area" id="contentArea">
            <!-- Dashboard Section -->
            <section id="dashboard-section" class="section">
                <h1 style="margin-bottom: 1.5rem; font-size: 1.75rem; font-weight: 700;">대시보드</h1>

                <!-- Stats -->
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-icon primary">
                            <i class="fas fa-users"></i>
                        </div>
                        <div class="stat-content">
                            <div class="stat-label">총 회원수</div>
                            <div class="stat-value" id="totalUsers">0</div>
                            <div class="stat-change positive">
                                <i class="fas fa-arrow-up"></i>
                                <span>12% 증가</span>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon success">
                            <i class="fas fa-file-alt"></i>
                        </div>
                        <div class="stat-content">
                            <div class="stat-label">콘텐츠</div>
                            <div class="stat-value" id="totalContent">0</div>
                            <div class="stat-change positive">
                                <i class="fas fa-arrow-up"></i>
                                <span>8% 증가</span>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon warning">
                            <i class="fas fa-eye"></i>
                        </div>
                        <div class="stat-content">
                            <div class="stat-label">방문자</div>
                            <div class="stat-value">1,234</div>
                            <div class="stat-change negative">
                                <i class="fas fa-arrow-down"></i>
                                <span>3% 감소</span>
                            </div>
                        </div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-icon danger">
                            <i class="fas fa-heart"></i>
                        </div>
                        <div class="stat-content">
                            <div class="stat-label">좋아요</div>
                            <div class="stat-value">567</div>
                            <div class="stat-change positive">
                                <i class="fas fa-arrow-up"></i>
                                <span>15% 증가</span>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Content Grid -->
                <div class="content-grid">
                    <!-- Recent Content -->
                    <div class="content-card">
                        <div class="card-header">
                            <div>
                                <div class="card-title">최근 콘텐츠</div>
                                <div class="card-subtitle">최근에 수정된 페이지</div>
                            </div>
                            <div class="card-actions">
                                <button class="btn btn-secondary btn-sm">
                                    <i class="fas fa-filter"></i>
                                    필터
                                </button>
                                <button class="btn btn-primary btn-sm" onclick="openCreateModal()">
                                    <i class="fas fa-plus"></i>
                                    새 콘텐츠
                                </button>
                            </div>
                        </div>
                        <div class="card-body">
                            <ul class="content-list" id="recentContentList">
                                <!-- Content items will be loaded here -->
                            </ul>
                        </div>
                    </div>

                    <!-- Recent Activity -->
                    <div class="content-card">
                        <div class="card-header">
                            <div class="card-title">최근 활동</div>
                        </div>
                        <div class="card-body">
                            <ul class="activity-list" id="activityList">
                                <!-- Activity items will be loaded here -->
                            </ul>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Other sections will be added here -->
        </div>
    </div>

    <!-- Inline Edit Button -->
    <button class="inline-edit-btn" id="inlineEditBtn" onclick="toggleInlineEdit()">
        <i class="fas fa-pencil-alt"></i>
    </button>

    <!-- Create/Edit Modal -->
    <div class="modal" id="contentModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title" id="modalTitle">콘텐츠 편집</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="contentForm">
                    <div class="form-group">
                        <label class="form-label">페이지</label>
                        <select class="form-control" id="pageSelect">
                            <option value="home">홈페이지</option>
                            <option value="operator">운영자 소개</option>
                            <option value="church">시온산교회</option>
                            <option value="empire">시온산제국</option>
                            <option value="books">책과 논문</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">제목</label>
                        <input type="text" class="form-control" id="contentTitle" placeholder="제목을 입력하세요">
                    </div>
                    <div class="form-group">
                        <label class="form-label">내용</label>
                        <textarea id="contentTextarea"></textarea>
                    </div>
                    <div class="form-group">
                        <label class="form-label">상태</label>
                        <select class="form-control" id="contentStatus">
                            <option value="active">활성</option>
                            <option value="inactive">비활성</option>
                            <option value="draft">초안</option>
                        </select>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">취소</button>
                <button class="btn btn-primary" onclick="saveContent()">
                    <i class="fas fa-save"></i>
                    저장
                </button>
            </div>
        </div>
    </div>

    <script>
        // API Base
        const API_BASE = '/api';
        const token = localStorage.getItem('token');

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (!token) {
                window.location.href = '/admin/login';
                return;
            }

            initializeTinyMCE();
            loadDashboardData();
            setupNavigation();
        });

        // Initialize TinyMCE
        function initializeTinyMCE() {
            tinymce.init({
                selector: '#contentTextarea',
                height: 400,
                menubar: false,
                plugins: [
                    'advlist', 'autolink', 'lists', 'link', 'image', 'charmap', 'preview',
                    'anchor', 'searchreplace', 'visualblocks', 'code', 'fullscreen',
                    'insertdatetime', 'media', 'table', 'help', 'wordcount'
                ],
                toolbar: 'undo redo | blocks | ' +
                    'bold italic backcolor | alignleft aligncenter ' +
                    'alignright alignjustify | bullist numlist outdent indent | ' +
                    'removeformat | help',
                content_style: 'body { font-family: Inter, Noto Sans KR, sans-serif; font-size: 14px }',
                language: 'ko',
                directionality: 'ltr'
            });
        }

        // Load Dashboard Data
        async function loadDashboardData() {
            try {
                const [usersRes, contentRes] = await Promise.all([
                    fetch(`${API_BASE}/users`, { headers: { 'Authorization': `Bearer ${token}` }}),
                    fetch(`${API_BASE}/content`, { headers: { 'Authorization': `Bearer ${token}` }})
                ]);

                if (usersRes.ok) {
                    const users = await usersRes.json();
                    document.getElementById('totalUsers').textContent = users.length;
                }

                if (contentRes.ok) {
                    const content = await contentRes.json();
                    document.getElementById('totalContent').textContent = content.length;
                    loadRecentContent(content);
                }

                loadRecentActivity();
            } catch (error) {
                console.error('Error loading dashboard data:', error);
            }
        }

        // Load Recent Content
        function loadRecentContent(content) {
            const list = document.getElementById('recentContentList');
            list.innerHTML = content.slice(0, 5).map(item => `
                <li class="content-item">
                    <div class="content-item-icon">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <div class="content-item-info">
                        <div class="content-item-title">${item.title || 'Untitled'}</div>
                        <div class="content-item-meta">${item.page || 'Unknown'} • ${new Date(item.createdAt).toLocaleDateString('ko-KR')}</div>
                    </div>
                    <div class="content-item-actions">
                        <button class="btn btn-secondary btn-sm" onclick="editContent('${item._id}')">
                            <i class="fas fa-edit"></i>
                        </button>
                        <span class="status-badge ${item.isActive ? 'active' : 'inactive'}">
                            ${item.isActive ? '활성' : '비활성'}
                        </span>
                    </div>
                </li>
            `).join('');
        }

        // Load Recent Activity
        function loadRecentActivity() {
            const activities = [
                { icon: 'fa-user-plus', text: '새로운 회원이 가입했습니다', time: '10분 전', color: 'primary' },
                { icon: 'fa-file-alt', text: '홈페이지 콘텐츠가 수정되었습니다', time: '25분 전', color: 'success' },
                { icon: 'fa-images', text: '새 이미지가 업로드되었습니다', time: '1시간 전', color: 'warning' },
                { icon: 'fa-comment', text: '새 댓글이 작성되었습니다', time: '2시간 전', color: 'danger' },
            ];

            const list = document.getElementById('activityList');
            list.innerHTML = activities.map(activity => `
                <li class="activity-item">
                    <div class="activity-icon">
                        <i class="fas ${activity.icon}" style="color: var(--${activity.color});"></i>
                    </div>
                    <div class="activity-content">
                        <div class="activity-text">${activity.text}</div>
                        <div class="activity-time">${activity.time}</div>
                    </div>
                </li>
            `).join('');
        }

        // Setup Navigation
        function setupNavigation() {
            document.querySelectorAll('.nav-item[data-section]').forEach(item => {
                item.addEventListener('click', (e) => {
                    e.preventDefault();
                    const section = item.dataset.section;
                    
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
                    item.classList.add('active');

                    // Here you would load the appropriate section
                    console.log('Navigating to:', section);
                });
            });
        }

        // Toggle Sidebar
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('active');
        }

        // Toggle Dark Mode
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        // Modal Functions
        function openCreateModal() {
            document.getElementById('modalTitle').textContent = '새 콘텐츠';
            document.getElementById('contentForm').reset();
            tinymce.get('contentTextarea').setContent('');
            document.getElementById('contentModal').classList.add('active');
        }

        function closeModal() {
            document.getElementById('contentModal').classList.remove('active');
        }

        // Save Content
        async function saveContent() {
            const content = tinymce.get('contentTextarea').getContent();
            const data = {
                page: document.getElementById('pageSelect').value,
                title: document.getElementById('contentTitle').value,
                content: content,
                isActive: document.getElementById('contentStatus').value === 'active'
            };

            try {
                const response = await fetch(`${API_BASE}/content`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(data)
                });

                if (response.ok) {
                    showNotification('콘텐츠가 저장되었습니다', 'success');
                    closeModal();
                    loadDashboardData();
                } else {
                    showNotification('저장 실패', 'error');
                }
            } catch (error) {
                showNotification('오류가 발생했습니다', 'error');
            }
        }

        // Show Notification
        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                <span>${message}</span>
            `;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.remove();
            }, 3000);
        }

        // Toggle Inline Edit
        function toggleInlineEdit() {
            const btn = document.getElementById('inlineEditBtn');
            btn.classList.toggle('active');
            // Inline edit functionality will be implemented here
        }

        // Logout
        function logout() {
            fetch(`${API_BASE}/auth/logout`, { method: 'POST' });
            localStorage.removeItem('token');
            window.location.href = '/admin/login';
        }
    </script>
</body>
</html>
